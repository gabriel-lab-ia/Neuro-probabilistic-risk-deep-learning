name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-neuro-risk.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-neuro-risk.txt

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests

  jsviz-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jsviz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: jsviz/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build viewer
        run: npm run build
